    runs-on: ubuntu-latest
    steps:
      - name: Stuur Ochtend Marktbrief via Telegram
        env:
          TG_TOKEN: "8695038106:AAGeu_iNW4AkgkiO0lDFZasUcOycxHrsk34"
          TG_CHAT: "951525403"
        run: |
          send() {
            local TEXT="$1"
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=${TEXT}" \
              -d "parse_mode=HTML"
            sleep 1
