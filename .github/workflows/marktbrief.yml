name: Dagelijkse Marktbrief
on: [push]
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Stuur Ochtend Marktbrief via Telegram
        env:
          TG_TOKEN: "8695038106:AAGeu_iNW4AkgkiO0lDFZasUcOycxHrsk34"
          TG_CHAT: "951525403"
        run: |
          send_msg() {
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT}" \
              --data-urlencode "text=$1" \
              -d "parse_mode=HTML"
            sleep 1
          }

          send_msg $'🇳🇱 <b>OCHTEND MARKTBRIEF \xe2\x80\x94 28 APRIL 2026</b>\n\xe2\x8f\xb0 09:14 AMS | Europese markt geopend'

